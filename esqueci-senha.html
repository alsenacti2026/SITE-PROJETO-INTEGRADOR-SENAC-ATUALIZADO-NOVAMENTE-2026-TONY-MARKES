<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEADI - Esqueci minha senha</title>
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/esqueci.css">
</head>
<body>

    <div class="ambient-light"></div>

    <main class="main-wrapper">
        <div class="login-card">
            <header class="card-header">
                <img src="img/seadi_1.png" alt="Logo SEADI" class="main-logo">
                <div class="brand-info">
                    <p class="tagline">Educação Digital Inteligente</p>
                    <h1 class="title">Esqueci minha senha</h1>
                </div>
            </header>

            <p class="auth-sub">Escolha como deseja receber o link de redefinição.</p>

            <div class="tabs">
                <button class="tab active" onclick="trocarAba('email')">E-mail</button>
                <button class="tab" onclick="trocarAba('telefone')">Telefone</button>
            </div>

            <div class="success-box" id="success-box"></div>

            <div class="tab-panel active" id="panel-email">
                <form class="login-form" onsubmit="return false;">
                    <div class="input-group">
                        <input type="email" id="email" placeholder="E-mail de cadastro" required>
                    </div>
                    <button type="button" class="btn-login" onclick="enviar('email')">
                        <span>ENVIAR LINK POR E-MAIL</span>
                    </button>
                </form>
            </div>

            <div class="tab-panel" id="panel-telefone">
                <form class="login-form" onsubmit="return false;">
                    <div class="input-group">
                        <input type="tel" id="telefone" placeholder="(00) 00000-0000" maxlength="15" oninput="mascaraTel(this)" required>
                    </div>
                    <button type="button" class="btn-login" onclick="enviar('telefone')">
                        <span>ENVIAR CÓDIGO POR SMS</span>
                    </button>
                </form>
            </div>

            <div class="card-footer">
                <div class="divider">
                    <span>OU</span>
                </div>
                <a href="login.html" class="forgot-password">Lembrou a senha? Voltar para o login</a>
            </div>
        </div>
    </main>

    <script src="JS/shared.js"></script>
    <script src="JS/api.js"></script>
    <script src="JS/esquecisenha.js"></script>
</body>
</html>
