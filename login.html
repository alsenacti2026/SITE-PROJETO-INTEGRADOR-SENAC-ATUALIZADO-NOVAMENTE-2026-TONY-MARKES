<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEADI - Login Premium</title>
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <div class="ambient-light"></div>

    <main class="main-wrapper">
        <div class="login-card">
            <header class="card-header">
                <img src="img/seadi_1.png" alt="Logo SEADI" class="main-logo">
                <div class="brand-info">
                    <p class="tagline">Educação Digital Inteligente</p>
                    <h1 class="title">Portal do Aluno</h1>
                </div>
            </header>

            <form class="login-form">
                <div class="input-group">
                    <input type="email" id="email" placeholder="E-mail de cadastro" required>
                </div>
                
                <div class="input-group" style="position:relative;">
                    <input type="password" id="password" placeholder="Senha" required>
                    <button type="button" class="pw-toggle" onclick="togglePw('password')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;">👁</button>
                </div>

                <button type="submit" class="btn-login">
                    <span>ENTRAR</span>
                </button>
            </form>

            <div class="card-footer">
                <div class="divider">
                    <span>OU</span>
                </div>
                <a href="esqueci-senha.html" class="forgot-password">Esqueceu sua senha?</a>
            </div>
        </div>

        <div class="signup-box">
            <p>Não possui uma conta? <a href="criarconta.html">Cadastre-se agora</a></p>
        </div>
    </main>

    <script src="JS/shared.js"></script>
    <script src="JS/api.js"></script>
    <script src="JS/login.js"></script>
</body>
</html>
