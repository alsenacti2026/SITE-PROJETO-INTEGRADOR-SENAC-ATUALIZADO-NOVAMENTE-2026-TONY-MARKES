<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/fonts.css">
  <link rel="stylesheet" href="../css/estilominhaconta.css">
  <title>Dados Cadastrais — Minha Área</title>

</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <img src="../img/seadi_1.png" alt="Logo SEADI" class="sidebar-logo-img">
  </div>
  <nav class="sidebar-nav">
    <span class="nav-label">Principal</span>
    <a class="nav-link" href="../index.html">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9.75L12 3l9 6.75V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.75z"/><path d="M9 21V12h6v9"/></svg>
      Página inicial
    </a>
    <a class="nav-link" href="progresson1.html">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      Progresso
    </a>
    <span class="nav-label">Conta</span>
    <a class="nav-link active" href="cadastro.html">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Dados cadastrais
    </a>
    <a class="nav-link" href="senha.html">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      Alterar senha
    </a>
  </nav>
  <div class="sidebar-footer">
    <a class="nav-link danger" href="#" onclick="logout()">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7"/><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/></svg>
      Sair
    </a>
  </div>
</aside>

<!-- ===== HEADER ===== -->
<header class="header">
  <div class="header-left">
    <button class="hamburger" onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </button>
    <span class="header-title">Dados cadastrais</span>
  </div>


    <!-- Menu de perfil -->
    <div class="perfil-wrapper">
      <div class="profile-trigger" id="btn-menu-perfil">
        <img src="https://www.w3schools.com/howto/img_avatar.png" id="avatar-pequeno" alt="avatar">
        <span id="display-nome-curto">Usuário</span>
        <i class="arrow-icon">▼</i>
      </div>
      <div id="idMenuPerfil" class="menu-premium">
        <a href="cadastro.html">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          Minha Conta
        </a>
        <a href="#" onclick="logout()" class="btn-logout">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7"/><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/></svg>
          Sair da Plataforma
        </a>
      </div>
    </div>
</header>

<!-- ===== MAIN CENTRALIZADO ===== -->
<main class="main">
  <div class="page-header">
    <h1>📋 Dados cadastrais</h1>
    <p>Atualize suas informações pessoais.</p>
  </div>
  <div class="card">
    <div class="profile-avatar-wrap">
        <div class="avatar-container">
            <img src="https://www.w3schools.com/howto/img_avatar.png" id="avatar-grande" class="avatar-img" alt="avatar grande">
            <label for="input-file" class="upload-badge">📷</label>
            <input type="file" id="input-file" accept="image/*" class="d-none">
            <span id="display-nome-curto"></span>
      </div>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Nome</label>
        <input class="form-input" type="text" id="inputNome" value="" placeholder="Seu nome">
      </div>
      <div class="form-group">
        <label class="form-label">Sobrenome</label>
        <input class="form-input" type="text" id="inputSobrenome" value="" placeholder="Seu sobrenome">
      </div>
      <div class="form-group full">
        <label class="form-label">E-mail</label>
        <input class="form-input" type="email" id="inputEmail" value="" placeholder="seu@email.com" readonly>
        <span class="form-hint">📧 Usado para login e recuperação de senha.</span>
      </div>
      <div class="form-group">
        <label class="form-label">Telefone</label>
        <input class="form-input" type="tel" id="inputTelefone" value="" placeholder="(00) 00000-0000">
      </div>
      <div class="form-group">
        <label class="form-label">Data de nascimento</label>
        <input class="form-input" type="date" id="inputNascimento" value="">
      </div>

      <div class="form-footer">
        <button class="btn btn-secondary" onclick="showToast('Alterações descartadas.')">↩️ Cancelar</button>
        <button class="btn btn-primary" onclick="salvarDados()">💾 Salvar alterações</button>
      </div>
    </div>
  </div>
</main>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toast-msg"></span>
</div>

<script src="../JS/shared.js"></script>
<script src="../JS/api.js"></script>
<script src="../JS/script.js"></script>
<script src="../JS/cadastro.js"></script>

</body>
</html>
