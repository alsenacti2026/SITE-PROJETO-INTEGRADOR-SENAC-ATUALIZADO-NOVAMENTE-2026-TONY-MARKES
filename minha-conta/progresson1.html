<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minha Área</title>
    <link rel="stylesheet" href="../css/fonts.css" />
    <link rel="stylesheet" href="../css/estilominhaconta.css" />
  </head>
  <body>
    <!-- Overlay escuro que aparece atrás da sidebar no mobile.
     Ao clicar nele, a sidebar fecha. -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <!-- ════════════════════════════════════════
     SIDEBAR — menu lateral fixo
════════════════════════════════════════ -->
    <aside class="sidebar" id="sidebar">
      <!-- Logo e nome do sistema -->
      <div class="sidebar-logo">
        <img src="../img/seadi_1.png" alt="Logo SEADI" class="sidebar-logo-img">
      </div>

      <!-- Links de navegação principal -->
      <nav class="sidebar-nav">
        <span class="nav-label">Principal</span>

        <!-- Página inicial: link real, sem <a> aninhado -->
        <a class="nav-link" href="../index.html" onclick="setActive(this)">
          <svg
            class="nav-icon"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path
              d="M3 9.75L12 3l9 6.75V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.75z"
            />
            <path d="M9 21V12h6v9" />
          </svg>
          Página inicial
        </a>

        <!-- Progresso: ativo, pois é esta página -->
        <a
          class="nav-link active"
          href="progresson1.html"
          onclick="setActive(this)"
        >
          <svg
            class="nav-icon"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <circle cx="12" cy="12" r="9" />
            <path d="M12 7v5l3 3" />
          </svg>
          Progresso
        </a>

        <!-- Seção de links da conta do usuário -->
        <span class="nav-label">Conta</span>

        <!-- Dados cadastrais: link real -->
        <a class="nav-link" href="cadastro.html" onclick="setActive(this)">
          <svg
            class="nav-icon"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
          </svg>
          Dados cadastrais
        </a>

        <!-- Alterar senha: link real -->
        <a class="nav-link" href="senha.html" onclick="setActive(this)">
          <svg
            class="nav-icon"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0110 0v4" />
          </svg>
          Alterar senha
        </a>
      </nav>

      <!-- Botão de sair no rodapé da sidebar -->
      <div class="sidebar-footer">
        <a class="nav-link danger" href="#" onclick="logout()">
          <svg
            class="nav-icon"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path d="M17 16l4-4m0 0l-4-4m4 4H7" />
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
          </svg>
          Sair
        </a>
      </div>
    </aside>

    <!-- ════════════════════════════════════════
     HEADER — barra superior fixa
════════════════════════════════════════ -->
    <header class="header">
      <!-- Lado esquerdo: hamburguer (mobile) + título da página -->
      <div class="header-left">
        <button
          class="hamburger"
          id="hamburger"
          onclick="toggleSidebar()"
          aria-label="Abrir menu"
        >
          <span></span><span></span><span></span>
        </button>
        <span class="header-title">Progresso</span>
      </div>

      <div class="perfil-wrapper">
        <div class="profile-trigger" id="btn-menu-perfil">
          <img src="https://www.w3schools.com/howto/img_avatar.png" id="avatar-pequeno">
          <span id="display-nome-curto">Usuário</span>
          <i class="arrow-icon">▼</i>
        </div>
        <div id="idMenuPerfil" class="menu-premium">
          <a href="cadastro.html">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            Minha Conta
          </a>
          <a href="#" onclick="logout()" class="btn-logout">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7"/><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/></svg>
            Sair da Plataforma
          </a>
        </div>
      </div>
    </header>

    <!--CONTEÚDO PRINCIPAL DA PÁGINA-->
    <main class="main">
      <!-- Saudação e subtítulo do topo -->
      <div class="page-header">
        <h1>Olá, usuario 👋</h1>
        <p>Bem-vindo de volta. Veja seu resumo de hoje.</p>
      </div>

      <!-- ── Cards de estatísticas ── -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-top">
            <span class="stat-label">Progresso geral</span>
            <div class="stat-icon" style="background: #eef2ff">📈</div>
          </div>
          <div class="stat-value" id="stat-progresso">0%</div>
          <div class="stat-sub" id="stat-aulas-sub"><span>0</span> de <span>0</span> aulas</div>
        </div>

        <div class="stat-card">
          <div class="stat-top">
            <span class="stat-label">Dias seguidos</span>
            <div class="stat-icon" style="background: #fef3c7">🔥</div>
          </div>
          <div class="stat-value" id="stat-dias">0</div>
          <div class="stat-sub" id="stat-dias-sub">Melhor: <span>0</span> dias</div>
        </div>
      </div>

      <!-- ── Módulos com aulas individuais ── -->
      <div id="modules-container">
        <!-- Preenchido dinamicamente pelo JS -->
      </div>

      <!-- Botão reset -->
      <div class="text-center mt-xl">
        <button class="btn btn-danger" onclick="resetProgress()">Resetar progresso</button>
      </div>
    </main>

    <!-- ════════════════════════════════════════
     JAVASCRIPT
════════════════════════════════════════ -->
    <script src="../JS/shared.js"></script>
    <script src="../JS/api.js"></script>
    <script src="../JS/aulas.js"></script>
    <script src="../JS/script.js"></script>
    <script>
        function resetProgress() {
            if (!confirm('Tem certeza que deseja resetar todo o seu progresso?')) return;
            apiFetch('/progress/reset', { method: 'POST' }).then(function () {
                showToast('Progresso resetado!');
                setTimeout(function () { location.reload(); }, 1000);
            }).catch(function (err) {
                showToast('Erro: ' + err.message);
            });
        }

        document.addEventListener('DOMContentLoaded', async function () {
            if (!isAuthenticated()) { window.location.href = '../login.html'; return; }

            try {
                var profile = await apiFetch('/auth/profile');
                var nome = profile.nome || 'Usuario';
                var primeiroNome = nome.split(' ')[0];
                document.querySelector('.page-header h1').textContent = 'Ola, ' + primeiroNome + ' 👋';
            } catch (e) {
                document.querySelector('.page-header h1').textContent = 'Ola, Usuario 👋';
            }

            try {
                var stats = await apiFetch('/progress/statistics');
                document.getElementById('stat-progresso').textContent = (stats.progressoGeral || 0) + '%';
                document.getElementById('stat-dias').textContent = stats.diasSeguidos || 0;
                var aulasSub = document.getElementById('stat-aulas-sub');
                if (aulasSub) aulasSub.innerHTML = '<span>' + (stats.aulasConcluidas || 0) + '</span> de <span>' + (stats.totalAulas || 0) + '</span> aulas';
                var diasSub = document.getElementById('stat-dias-sub');
                if (diasSub) diasSub.innerHTML = 'Melhor: <span>' + (stats.melhorSequencia || 0) + ' dias</span>';
            } catch (e) {
                console.error('Failed to load statistics:', e);
            }

            try {
                var status = await apiFetch('/progress/status');
                var concluidas = {};
                var emAndamento = {};
                var i;
                for (i = 0; i < status.concluidas.length; i++) concluidas[status.concluidas[i]] = true;
                for (var k in status.emAndamento) emAndamento[k] = status.emAndamento[k];

                var container = document.getElementById('modules-container');
                if (!container) return;
                container.innerHTML = '';

                for (var m = 0; m < MODULOS.length; m++) {
                    var mod = MODULOS[m];
                    var concluidasMod = 0;
                    for (i = 0; i < mod.aulas.length; i++) {
                        if (concluidas[mod.aulas[i].id]) concluidasMod++;
                    }
                    var pct = mod.aulas.length > 0 ? Math.round((concluidasMod / mod.aulas.length) * 100) : 0;
                    var barColor = pct >= 100 ? '#10B981' : pct > 0 ? '#6366F1' : 'rgba(255,255,255,0.1)';

                    var lessonsHtml = '';
                    for (i = 0; i < mod.aulas.length; i++) {
                        var aula = mod.aulas[i];
                        var bloqueada = !isAulaDesbloqueada(aula.id, concluidas);
                        var link = bloqueada ? '#' : '../' + mod.prefixo + aula.arquivo;
                        var concluida = !!concluidas[aula.id];
                        var pctText = concluida ? 'Concluido' : (emAndamento[aula.id] ? emAndamento[aula.id] + '%' : '');
                        var statusClass = concluida ? ' concluido' : ' em-andamento';
                        lessonsHtml += '<div class="lesson-item' + (bloqueada ? ' bloqueada' : '') + '">' +
                            '<a href="' + link + '" class="lesson-link">' + aula.titulo + '</a>' +
                            (pctText ? '<span class="lesson-status' + (concluida ? ' concluido' : '') + '">' + pctText + '</span>' : '') +
                            '</div>';
                    }

                    var moduleHtml = '<div class="card">' +
                        '<div class="module-header">' +
                        '<div class="module-title">' + mod.titulo + '</div>' +
                        '<div class="module-count">' + concluidasMod + '/' + mod.aulas.length + ' aulas</div>' +
                        '</div>' +
                        '<div class="progress-bar" style="margin-bottom:16px;"><div class="progress-fill" style="width:' + pct + '%;background:' + barColor + ';"></div></div>' +
                        '<div class="lessons-list">' + lessonsHtml + '</div>' +
                        '</div>';

                    container.innerHTML += moduleHtml;
                }
            } catch (err) {
                console.error('Failed to load modules:', err);
                container.innerHTML = '<p class="lesson-status" style="color:#EF4444;text-align:center;">Erro ao carregar modulos. Verifique sua conexao e tente novamente.</p>';
            }
        });
    </script>
    <script>
      function setActive(el) {
        document.querySelectorAll(".nav-link").forEach(function (l) { l.classList.remove("active"); });
        el.classList.add("active");
        document.querySelector(".header-title").textContent = el.textContent.trim();
      }
    </script>
  </body>
</html>
