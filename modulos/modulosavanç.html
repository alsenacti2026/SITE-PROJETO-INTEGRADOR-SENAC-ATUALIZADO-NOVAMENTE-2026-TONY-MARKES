<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo Avançado - SEADI</title>
    <link rel="shortcut icon" href="../ico/icone 2.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/styleIndex.css">
</head>
<body data-module-order="3">

    <header class="header-elite">
        <div class="logo-box">
            <img src="../img/seadi_1.png" alt="Logo SEADI">
        </div>

        <div class="perfil-wrapper">
            <div class="profile-trigger" id="btn-menu-perfil">
                <img src="https://www.w3schools.com/howto/img_avatar.png" id="avatar-pequeno">
                <span id="display-nome-curto">Usuário</span>
                <i class="arrow-icon">▼</i>
            </div>
            <div id="idMenuPerfil" class="menu-premium">
                <a href="../minha-conta/cadastro.html">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                    Minha Conta
                </a>
                <a href="#" onclick="logout()" class="btn-logout">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7"/><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/></svg>
                    Sair da Plataforma
                </a>
            </div>
        </div>
    </header>

    <main style="padding: 20px 0;">
        <div class="glass-shell" style="max-width: 1300px; padding: 50px;">
            <h1 class="hero-title" id="module-title" style="font-size: 2.8rem; margin-bottom: 40px;">Módulo Avançado</h1>
            
            <div class="grid-premium" id="lessons-grid">
                <!-- Preenchido dinamicamente por modulos.js -->
            </div>

            <div style="display: flex; justify-content: center; margin-top: 50px;">
                <a href="../index.html" class="btn-account" style="padding: 12px 30px; color: white; text-decoration: none;">Voltar ao Menu Principal</a>
            </div>
        </div>
    </main>

    <script src="../JS/shared.js"></script>
    <script src="../JS/api.js"></script>
    <script src="../JS/aulas.js"></script>
    <script src="../JS/modulos.js"></script>
    <script src="../JS/script.js"></script>
</body>
</html>
